<!DOCTYPE html>

<html class="dark" lang="tr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "tertiary-container": "#9ca3b2",
                    "outline-variant": "#3c4a42",
                    "inverse-on-surface": "#313030",
                    "primary-fixed-dim": "#4edea3",
                    "surface-container": "#201f1f",
                    "surface": "#131313",
                    "on-tertiary-container": "#323946",
                    "error-container": "#93000a",
                    "on-tertiary-fixed-variant": "#404754",
                    "surface-tint": "#4edea3",
                    "on-secondary-fixed-variant": "#930013",
                    "on-tertiary-fixed": "#151c27",
                    "surface-container-low": "#1c1b1b",
                    "secondary-fixed": "#ffdad7",
                    "secondary-fixed-dim": "#ffb3ad",
                    "on-surface": "#e5e2e1",
                    "tertiary": "#c0c7d6",
                    "inverse-primary": "#006c49",
                    "on-primary": "#003824",
                    "tertiary-fixed": "#dce2f3",
                    "on-background": "#e5e2e1",
                    "tertiary-fixed-dim": "#c0c7d6",
                    "secondary-container": "#a40217",
                    "on-secondary": "#68000a",
                    "inverse-surface": "#e5e2e1",
                    "on-surface-variant": "#bbcabf",
                    "primary-fixed": "#6ffbbe",
                    "surface-container-highest": "#353534",
                    "surface-container-high": "#2a2a2a",
                    "on-error": "#690005",
                    "surface-dim": "#131313",
                    "background": "#131313",
                    "on-tertiary": "#2a313d",
                    "surface-container-lowest": "#0e0e0e",
                    "error": "#ffb4ab",
                    "on-secondary-fixed": "#410004",
                    "primary": "#4edea3",
                    "surface-bright": "#393939",
                    "secondary": "#ffb3ad",
                    "surface-variant": "#353534",
                    "primary-container": "#10b981",
                    "on-primary-fixed": "#002113",
                    "on-error-container": "#ffdad6",
                    "on-primary-fixed-variant": "#005236",
                    "on-secondary-container": "#ffaea8",
                    "outline": "#86948a",
                    "on-primary-container": "#00422b"
            },
            "borderRadius": {
                    "DEFAULT": "1rem",
                    "lg": "2rem",
                    "xl": "3rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Inter"],
                    "body": ["Inter"],
                    "label": ["Inter"]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .text-shadow-monolith {
            text-shadow: 0px 4px 24px rgba(229, 226, 225, 0.1);
        }
    </style>
</head>
<body class="bg-surface text-on-surface font-body selection:bg-primary-container selection:text-on-primary-container">
<!-- TopAppBar -->
<header class="fixed top-0 w-full bg-[#131313] flex justify-between items-center px-6 h-16 w-full max-w-none z-50">
<div class="font-['Inter'] font-extrabold tracking-tighter text-xl font-black text-[#E5E2E1] tracking-[0.05em] uppercase">SAYAC</div>
<div class="flex items-center gap-4">
<button class="text-[#9CA3B2] hover:bg-[#353534] transition-colors p-2 rounded-full active:scale-95">
<span class="material-symbols-outlined" data-icon="history">history</span>
</button>
<button class="text-[#9CA3B2] hover:bg-[#353534] transition-colors p-2 rounded-full active:scale-95">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
</button>
</div>
</header>
<main class="min-h-screen flex flex-col items-center justify-center pt-16 pb-32 px-6 overflow-hidden">
<!-- Kinetic Monolith Container -->
<div class="relative w-full max-w-md flex flex-col items-center">
<!-- Contextual Decorative Gradient -->
<div class="absolute -top-24 -left-24 w-64 h-64 bg-primary-container/10 blur-[100px] rounded-full"></div>
<div class="absolute -bottom-24 -right-24 w-64 h-64 bg-secondary-container/10 blur-[100px] rounded-full"></div>
<!-- The Hero Counter -->
<div class="relative z-10 flex flex-col items-center mb-16 select-none">
<span class="text-on-tertiary-container/30 font-label text-[0.75rem] font-medium uppercase tracking-[0.2em] mb-4">Mevcut Sayaç</span>
<div class="text-[8rem] md:text-[12rem] font-black leading-none tracking-[-0.04em] text-on-surface text-shadow-monolith">
                    0
                </div>
<div class="mt-4 flex items-center gap-2">
<div class="w-1.5 h-1.5 rounded-full bg-primary animate-pulse"></div>
<span class="text-[0.75rem] text-tertiary-container uppercase tracking-widest font-medium">Canlı Oturum</span>
</div>
</div>
<!-- Kinetic Action Controls -->
<div class="w-full space-y-6">
<!-- Artır Button (Primary) -->
<button class="group relative w-full h-24 bg-gradient-to-br from-primary-container to-primary rounded-xl overflow-hidden active:scale-[0.96] transition-all duration-200 flex items-center justify-center shadow-[0_20px_40px_rgba(16,185,129,0.15)]">
<div class="absolute inset-0 bg-black/0 group-hover:bg-black/5 transition-colors"></div>
<div class="relative flex items-center gap-3">
<span class="material-symbols-outlined text-[2rem] text-on-primary" data-icon="add" style="font-variation-settings: 'wght' 700;">add</span>
<span class="text-[1.375rem] font-medium uppercase tracking-[0.05em] text-on-primary">Artır</span>
</div>
</button>
<div class="grid grid-cols-2 gap-4">
<!-- Azalt Button (Secondary) -->
<button class="h-20 bg-secondary-container rounded-lg active:scale-[0.96] transition-all duration-200 flex items-center justify-center hover:brightness-110">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-on-secondary" data-icon="remove">remove</span>
<span class="text-[1.125rem] font-medium uppercase tracking-[0.05em] text-on-secondary">Azalt</span>
</div>
</button>
<!-- Sıfırla Button (Tertiary) -->
<button class="h-20 bg-surface-container-highest rounded-lg active:scale-[0.96] transition-all duration-200 flex items-center justify-center hover:bg-surface-container-high border border-outline-variant/10">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-tertiary" data-icon="restart_alt">restart_alt</span>
<span class="text-[1.125rem] font-medium uppercase tracking-[0.05em] text-tertiary">Sıfırla</span>
</div>
</button>
</div>
</div>
<!-- Editorial Log Snippet (Bento-style Minimal Card) -->
<div class="w-full mt-12 p-6 bg-surface-container-lowest rounded-lg border border-outline-variant/5">
<div class="flex justify-between items-center mb-4">
<span class="text-[0.75rem] font-bold text-on-surface-variant uppercase tracking-widest">Son Aktivite</span>
<span class="text-[0.7rem] text-tertiary-container">Bugün, 14:45</span>
</div>
<div class="space-y-4">
<div class="flex items-center justify-between py-2">
<div class="flex items-center gap-3">
<div class="w-8 h-8 rounded-full bg-primary-container/20 flex items-center justify-center">
<span class="material-symbols-outlined text-primary text-sm" data-icon="add">add</span>
</div>
<span class="text-sm font-medium">Sayaç Artırıldı</span>
</div>
<span class="text-sm font-bold text-primary">+1</span>
</div>
<div class="flex items-center justify-between py-2 border-t border-outline-variant/5">
<div class="flex items-center gap-3">
<div class="w-8 h-8 rounded-full bg-secondary-container/20 flex items-center justify-center">
<span class="material-symbols-outlined text-secondary text-sm" data-icon="remove">remove</span>
</div>
<span class="text-sm font-medium">Sayaç Azaltıldı</span>
</div>
<span class="text-sm font-bold text-secondary">-1</span>
</div>
</div>
</div>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-8 pb-8 pt-4 bg-[#131313]/80 backdrop-blur-xl rounded-t-[3rem] shadow-[0px_-20px_40px_rgba(0,0,0,0.4)]">
<!-- Active Tab: Sayaç -->
<a class="flex flex-col items-center justify-center bg-[#353534] text-[#10B981] rounded-full px-6 py-2 transition-opacity hover:opacity-100" href="#">
<span class="material-symbols-outlined" data-icon="counter_1" style="font-variation-settings: 'FILL' 1;">counter_1</span>
<span class="font-['Inter'] text-[0.75rem] font-medium uppercase tracking-widest mt-0.5">Sayaç</span>
</a>
<!-- Inactive Tab: Geçmiş -->
<a class="flex flex-col items-center justify-center text-[#9CA3B2] opacity-60 hover:opacity-100 transition-opacity" href="#">
<span class="material-symbols-outlined" data-icon="history">history</span>
<span class="font-['Inter'] text-[0.75rem] font-medium uppercase tracking-widest mt-1">Geçmiş</span>
</a>
<!-- Inactive Tab: Ayarlar -->
<a class="flex flex-col items-center justify-center text-[#9CA3B2] opacity-60 hover:opacity-100 transition-opacity" href="#">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
<span class="font-['Inter'] text-[0.75rem] font-medium uppercase tracking-widest mt-1">Ayarlar</span>
</a>
</nav>
</body></html>
