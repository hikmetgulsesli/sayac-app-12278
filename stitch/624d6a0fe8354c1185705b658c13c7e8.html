<!DOCTYPE html>

<html class="dark" lang="tr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "tertiary-container": "#9ca3b2",
                    "outline-variant": "#3c4a42",
                    "inverse-on-surface": "#313030",
                    "primary-fixed-dim": "#4edea3",
                    "surface-container": "#201f1f",
                    "surface": "#131313",
                    "on-tertiary-container": "#323946",
                    "error-container": "#93000a",
                    "on-tertiary-fixed-variant": "#404754",
                    "surface-tint": "#4edea3",
                    "on-secondary-fixed-variant": "#930013",
                    "on-tertiary-fixed": "#151c27",
                    "surface-container-low": "#1c1b1b",
                    "secondary-fixed": "#ffdad7",
                    "secondary-fixed-dim": "#ffb3ad",
                    "on-surface": "#e5e2e1",
                    "tertiary": "#c0c7d6",
                    "inverse-primary": "#006c49",
                    "on-primary": "#003824",
                    "tertiary-fixed": "#dce2f3",
                    "on-background": "#e5e2e1",
                    "tertiary-fixed-dim": "#c0c7d6",
                    "secondary-container": "#a40217",
                    "on-secondary": "#68000a",
                    "inverse-surface": "#e5e2e1",
                    "on-surface-variant": "#bbcabf",
                    "primary-fixed": "#6ffbbe",
                    "surface-container-highest": "#353534",
                    "surface-container-high": "#2a2a2a",
                    "on-error": "#690005",
                    "surface-dim": "#131313",
                    "background": "#131313",
                    "on-tertiary": "#2a313d",
                    "surface-container-lowest": "#0e0e0e",
                    "error": "#ffb4ab",
                    "on-secondary-fixed": "#410004",
                    "primary": "#4edea3",
                    "surface-bright": "#393939",
                    "secondary": "#ffb3ad",
                    "surface-variant": "#353534",
                    "primary-container": "#10b981",
                    "on-primary-fixed": "#002113",
                    "on-error-container": "#ffdad6",
                    "on-primary-fixed-variant": "#005236",
                    "on-secondary-container": "#ffaea8",
                    "outline": "#86948a",
                    "on-primary-container": "#00422b"
            },
            "borderRadius": {
                    "DEFAULT": "1rem",
                    "lg": "2rem",
                    "xl": "3rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Inter"],
                    "body": ["Inter"],
                    "label": ["Inter"]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-surface text-on-surface antialiased overflow-hidden min-h-screen flex flex-col">
<!-- Header Suppression: Following Shell Visibility & Relevance Policy (Transactional/Error) -->
<header class="fixed top-0 w-full flex justify-between items-center px-6 h-16 z-50">
<div class="font-['Inter'] font-extrabold tracking-tighter text-xl font-black text-[#E5E2E1] tracking-[0.05em] uppercase">
            SAYAC
        </div>
</header>
<main class="flex-grow flex items-center justify-center relative p-6">
<!-- Background Monolith Aesthetic -->
<div class="absolute inset-0 z-0 pointer-events-none overflow-hidden">
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[800px] h-[800px] bg-secondary-container opacity-10 blur-[160px] rounded-full"></div>
<div class="absolute top-1/4 left-1/4 w-[400px] h-[400px] bg-primary-container opacity-5 blur-[120px] rounded-full"></div>
</div>
<div class="relative z-10 max-w-xl w-full text-center space-y-12">
<!-- Asymmetric Kinetic Monolith: Error State -->
<div class="relative inline-block">
<div class="text-[12rem] md:text-[16rem] font-black tracking-tighter text-surface-container-highest opacity-20 select-none leading-none">
                    404
                </div>
<div class="absolute inset-0 flex items-center justify-center">
<span class="material-symbols-outlined text-[8rem] text-secondary-container" data-icon="running_with_errors">running_with_errors</span>
</div>
</div>
<div class="space-y-6">
<!-- Tonal Stacking Typography -->
<h1 class="text-4xl md:text-5xl font-black tracking-tight text-on-surface leading-tight">
                    Bir Şeyler <span class="text-secondary-container">Yanlış Gitti</span>
</h1>
<p class="text-tertiary-container text-lg md:text-xl font-medium max-w-md mx-auto leading-relaxed">
                    Lütfen sayfayı yenilemeyi deneyin veya daha sonra tekrar gelin.
                </p>
</div>
<!-- Kinetic Action Buttons -->
<div class="flex flex-col items-center gap-6 pt-8">
<button class="group relative w-full md:w-auto px-12 py-6 bg-primary-container text-on-primary-container rounded-xl font-black text-xl tracking-[0.05em] transition-all active:scale-[0.96] flex items-center justify-center gap-3 shadow-[0px_20px_40px_rgba(16,185,129,0.1)]">
<span class="material-symbols-outlined" data-icon="home">home</span>
                    Ana Sayfaya Dön
                </button>
<button class="text-tertiary hover:text-on-surface transition-colors font-medium flex items-center gap-2 px-8 py-3 rounded-full hover:bg-surface-container-high">
<span class="material-symbols-outlined text-lg" data-icon="refresh">refresh</span>
<span>Tekrar Dene</span>
</button>
</div>
</div>
</main>
<!-- Bottom Navigation Suppressed: Following "Destination" Rule for Error/Task-Focused Pages -->
<!-- Subtle Ambient Visual Detail (Editorial Canvas) -->
<div class="fixed bottom-12 left-12 hidden lg:block opacity-20 pointer-events-none">
<div class="flex flex-col gap-1 border-l border-outline-variant/30 pl-4">
<span class="text-[0.6rem] font-black uppercase tracking-[0.2em] text-outline">System_Status</span>
<span class="text-xs font-mono text-secondary-container">ERROR_CORE_ASYNC_FAILURE</span>
</div>
</div>
</body></html>
