<!DOCTYPE html>

<html class="dark" lang="tr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {

                    "tertiary-container": "#9ca3b2",

                    "on-tertiary-fixed": "#151c27",
                    "surface-container-low": "#1c1b1b",
                    "secondary-fixed": "#ffdad7",
                    "secondary-fixed-dim": "#ffb3ad",
                    "on-surface": "#e5e2e1",
                    "tertiary": "#c0c7d6",
                    "inverse-primary": "#006c49",
                    "on-primary": "#003824",
                    "tertiary-fixed": "#dce2f3",
                    "on-background": "#e5e2e1",
                    "tertiary-fixed-dim": "#c0c7d6",
                    "secondary-container": "#a40217",
                    "on-secondary": "#68000a",
                    "inverse-surface": "#e5e2e1",
                    "on-surface-variant": "#bbcabf",
                    "primary-fixed": "#6ffbbe",
                    "surface-container-highest": "#353534",
                    "surface-container-high": "#2a2a2a",
                    "on-error": "#690005",
                    "surface-dim": "#131313",

                    "on-tertiary": "#2a313d",
                    "surface-container-lowest": "#0e0e0e",
                    "error": "#ffb4ab",
                    "on-secondary-fixed": "#410004",
                    "primary": "#4edea3",
                    "surface-bright": "#393939",
                    "secondary": "#ffb3ad",
                    "surface-variant": "#353534",
                    "primary-container": "#10b981",
                    "on-primary-fixed": "#002113",
                    "on-error-container": "#ffdad6",
                    "on-primary-fixed-variant": "#005236",
                    "on-secondary-container": "#ffaea8",
                    "outline": "#86948a",
                    "on-primary-container": "#00422b"
            },
            "borderRadius": {
                    "DEFAULT": "1rem",
                    "lg": "2rem",
                    "xl": "3rem",
                    "full": "9999px"

            "fontFamily": {
                    "headline": ["Inter"],
                    "body": ["Inter"],
                    "label": ["Inter"]
            }
          },
        },
      }

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #131313;
            color: #e5e2e1;
        }
        .text-glow {
            text-shadow: 0 0 40px rgba(16, 185, 129, 0.2);
        }
    </style>
</head>
<body class="bg-surface text-on-surface overflow-hidden">
<header class="fixed top-0 w-full flex justify-between items-center px-6 h-16 w-full max-w-none bg-[#131313] z-50">
<div class="text-xl font-black text-[#E5E2E1] tracking-[0.05em] uppercase font-['Inter'] font-extrabold tracking-tighter">
            SAYAC
        </div>
<div class="flex gap-4">
<button class="text-[#9CA3B2] hover:bg-[#353534] transition-colors p-2 rounded-full">
<span class="material-symbols-outlined" data-icon="history">history</span>
</button>
<button class="text-[#9CA3B2] hover:bg-[#353534] transition-colors p-2 rounded-full">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
</button>
</div>
</header>
<main class="relative min-h-screen flex flex-col items-center justify-center p-6 bg-surface">
<div class="absolute inset-0 opacity-10 pointer-events-none" style="background-image: radial-gradient(circle at 50% 50%, #10B981 0%, transparent 60%);"></div>
<div class="relative z-10 flex flex-col items-center max-w-lg w-full text-center">
<div class="mb-8 select-none">
<h1 class="text-[10rem] md:text-[14rem] font-black leading-none tracking-tighter text-[#353534] text-glow">
                    404
                </h1>
</div>
<div class="space-y-4">
<h2 class="text-3xl md:text-4xl font-bold tracking-tight text-on-surface">
                    Sayfa Bulunamadı
                </h2>
<p class="text-tertiary-container text-lg md:text-xl font-medium leading-relaxed max-w-md mx-auto">
                    Aradığınız sayfa mevcut değil veya taşınmış olabilir.
                </p>
</div>
<div class="mt-12 w-full">
<a class="group relative inline-flex items-center justify-center w-full md:w-auto px-12 py-5 bg-primary-container text-on-primary font-bold text-lg rounded-xl hover:scale-95 transition-all duration-300" href="/">
<span class="relative z-10">Ana Sayfaya Dön</span>
<div class="absolute inset-0 rounded-xl bg-gradient-to-br from-primary-container to-primary opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div>
</a>
</div>
<div class="mt-16 flex items-center justify-center gap-8 opacity-40">
<div class="h-[1px] w-12 bg-outline-variant"></div>
<div class="flex gap-4">
<span class="material-symbols-outlined text-sm" data-icon="error">error</span>
<span class="material-symbols-outlined text-sm" data-icon="dangerous">dangerous</span>
<span class="material-symbols-outlined text-sm" data-icon="query_stats">query_stats</span>
</div>
<div class="h-[1px] w-12 bg-outline-variant"></div>
</div>
</div>
<div class="absolute bottom-24 right-[-5%] w-64 h-64 bg-secondary-container/5 blur-[120px] rounded-full pointer-events-none"></div>
<div class="absolute top-24 left-[-5%] w-96 h-96 bg-primary-container/5 blur-[150px] rounded-full pointer-events-none"></div>
</main>
<footer class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-8 pb-8 pt-4 bg-[#131313]/80 backdrop-blur-xl rounded-t-[3rem] shadow-[0px_-20px_40px_rgba(0,0,0,0.4)]">
<div class="flex flex-col items-center justify-center text-[#9CA3B2] opacity-60 hover:opacity-100 transition-opacity cursor-pointer group">
<span class="material-symbols-outlined group-active:scale-90 transition-transform" data-icon="counter_1">counter_1</span>
<span class="font-['Inter'] text-[0.75rem] font-medium uppercase tracking-widest mt-1">Sayaç</span>
</div>
<div class="flex flex-col items-center justify-center text-[#9CA3B2] opacity-60 hover:opacity-100 transition-opacity cursor-pointer group">
<span class="material-symbols-outlined group-active:scale-90 transition-transform" data-icon="history">history</span>
<span class="font-['Inter'] text-[0.75rem] font-medium uppercase tracking-widest mt-1">Geçmiş</span>
</div>
<div class="flex flex-col items-center justify-center text-[#9CA3B2] opacity-60 hover:opacity-100 transition-opacity cursor-pointer group">
<span class="material-symbols-outlined group-active:scale-90 transition-transform" data-icon="settings">settings</span>
<span class="font-['Inter'] text-[0.75rem] font-medium uppercase tracking-widest mt-1">Ayarlar</span>
</div>
</footer>
